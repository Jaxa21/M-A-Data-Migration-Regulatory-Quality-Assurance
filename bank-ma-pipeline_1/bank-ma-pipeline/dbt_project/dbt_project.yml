name: "bank_ma_migration"
version: "1.0.0"
config-version: 2

profile: "bank_ma_migration"

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  bank_ma_migration:
    # Layer 1 — Raw ingestion: materialized as tables for full audit trail
    raw:
      +materialized: table
      +schema: raw
      +tags: ["raw", "bcbs239_lineage"]

    # Layer 2 — Clean validated data
    clean:
      +materialized: table
      +schema: clean
      +tags: ["clean", "regulatory_reporting"]

vars:
  # FX rates for currency normalisation to PLN
  # In production these would come from an NBP API feed
  eur_to_pln: 4.28
  usd_to_pln: 3.92

  # Risk thresholds
  pd_low_threshold: 0.05
  pd_medium_threshold: 0.20
  pd_high_threshold: 0.50
