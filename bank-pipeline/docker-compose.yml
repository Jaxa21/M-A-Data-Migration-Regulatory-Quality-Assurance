version: "3.9"

# ─────────────────────────────────────────────
#  Bank M&A Data Migration Pipeline
#  Full containerised stack — no local installs
# ─────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    # Connection strings for both bank databases
    SOURCE_DB_CONN: "postgresql+psycopg2://${POSTGRES_USER:-bankuser}:${POSTGRES_PASSWORD:-bankpass}@source-db:5432/bank_b_legacy
    TARGET_DB_CONN: "postgresql+psycopg2://${POSTGRES_USER:-bankuser}:${POSTGRES_PASSWORD:-bankpass}@target-db:5432/bank_a_dwh
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./validation:/opt/airflow/validation
    - ./dbt_project:/opt/airflow/dbt_project
    - ./logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    airflow-db:
      condition: service_healthy
  networks:
    - pipeline-net

services:

  # ── 1. Source DB: Bank B Legacy System ──────────────────
  source-db:
    image: postgres:15-alpine
    container_name: bank_b_legacy
    environment:
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-bankpass}"
      POSTGRES_DB: bank_b_legacy
    ports:
      - "5433:5432"
    volumes:
      - source-db-data:/var/lib/postgresql/data
      - ./scripts/init_source.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bank_b_legacy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-net

  # ── 2. Target DB: Bank A Data Warehouse ─────────────────
  target-db:
    image: postgres:15-alpine
    container_name: bank_a_dwh
    environment:
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-bankpass}"
      POSTGRES_DB: bank_a_dwh
    ports:
      - "5434:5432"
    volumes:
      - target-db-data:/var/lib/postgresql/data
      - ./scripts/init_target.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bank_a_dwh"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-net

  # ── 3. Airflow Metadata DB ───────────────────────────────
  airflow-db:
    image: postgres:15-alpine
    container_name: airflow_metadata_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-net

  # ── 4. Airflow Init (creates admin user once) ────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install dbt-postgres==1.7.4 dbt-utils pandas scipy faker psycopg2-binary sqlalchemy --quiet
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-admin} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@bank-pipeline.local
        cd /opt/airflow/dbt_project && dbt deps --profiles-dir .
    restart: on-failure

  # ── 5. Airflow Webserver (UI at localhost:8080) ──────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── 6. Airflow Scheduler ─────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: unless-stopped

  # ── 7. Data Generator (runs once, then exits) ────────────
  data-generator:
    image: python:3.11-slim
    container_name: data_generator
    environment:
      SOURCE_DB_HOST: source-db
      SOURCE_DB_PORT: 5432
      SOURCE_DB_USER: bankuser
      SOURCE_DB_PASS: "${POSTGRES_PASSWORD:-bankpass}"
      SOURCE_DB_NAME: bank_b_legacy
      NUM_RECORDS: "1000000"   # Change to 5000000 for full dataset
    volumes:
      - ./data_generator:/app
    working_dir: /app
    command: >
      bash -c "pip install faker pandas numpy sqlalchemy psycopg2-binary --quiet &&
               python generate_loans.py"
    depends_on:
      source-db:
        condition: service_healthy
    networks:
      - pipeline-net

volumes:
  source-db-data:
  target-db-data:
  airflow-db-data:
  airflow-plugins:

networks:
  pipeline-net:
    driver: bridge
