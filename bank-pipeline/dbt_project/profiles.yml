bank_ma_migration:
  target: dev
  outputs:
    dev:
      type: postgres
      host: target-db         # Docker service name
      port: 5432
      user: bankuser
      password: bankpass
      dbname: bank_a_dwh
      schema: raw             # default schema; overridden per model layer
      threads: 4
      connect_timeout: 30

    # For running dbt locally (outside Docker) point to mapped ports
    local:
      type: postgres
      host: localhost
      port: 5434              # mapped port in docker-compose
      user: bankuser
      password: bankpass
      dbname: bank_a_dwh
      schema: raw
      threads: 4
